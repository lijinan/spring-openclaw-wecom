server:
  port: 8080

spring:
  application:
    name: spring-openclaw-wecom

wecom:
  relay:
    response-timeout: 60000
    ping-interval: 30000
    max-pending-messages: 1000
    auth-token: ${WECON_RELAY_AUTH_TOKEN:openclaw-secret-token}

logging:
  level:
    root: INFO
    com.openclaw.wecom: DEBUG
